<body style="margin:0;padding:0;background-color:#0B0B0F;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0B0B0F;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:420px;">

          <tr>
            <td align="center" style="padding-bottom:32px;">
              <span style="font-size:28px;font-weight:800;letter-spacing:4px;color:#FFFFFF;">TRIBE</span>
            </td>
          </tr>

          <tr>
            <td style="background-color:#161622;border-radius:20px;padding:36px 28px;border:1px solid #26263A;">
              <p style="margin:0 0 8px;font-size:20px;font-weight:700;color:#FFFFFF;text-align:center;">
                Il tuo codice di accesso
              </p>
              <p style="margin:0 0 28px;font-size:15px;line-height:22px;color:#A1A1AA;text-align:center;">
                Inserisci questo codice nell'app per accedere al tuo account TRIBE.
              </p>

              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding:20px 0;background:linear-gradient(135deg,#7C3AED,#38BDF8);border-radius:16px;">
                    <span style="font-family:'JetBrains Mono',Menlo,Consolas,monospace;font-size:34px;font-weight:700;letter-spacing:8px;color:#FFFFFF;">
                      {{ .Token }}
                    </span>
                  </td>
                </tr>
              </table>

              <p style="margin:24px 0 0;font-size:13px;line-height:18px;color:#A1A1AA;text-align:center;">
                Il codice scade tra pochi minuti e può essere usato una sola volta.<br/>
                Se non sei stato tu, ignora questa email: il tuo account resta al sicuro.
              </p>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding-top:28px;">
              <span style="font-size:12px;color:#52525B;">TRIBE — Il travel OS per gruppi di amici</span>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
